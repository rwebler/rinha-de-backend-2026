services:
  lb:
    image: nginx:1.29-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "24MB"

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      PROBE_COUNT: "12"
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "160MB"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      PROBE_COUNT: "12"
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "160MB"
